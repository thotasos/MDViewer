name: MDViewer
options:
  bundleIdPrefix: com.mdviewer
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_ENTITLEMENTS: ""
    ENABLE_HARDENED_RUNTIME: "NO"

packages:
  Highlightr:
    url: https://github.com/raspu/Highlightr
    from: "2.2.1"

targets:
  MDViewer:
    type: application
    platform: macOS
    sources:
      - Sources
      - path: Resources/Assets.xcassets
        type: folder
    resources:
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mdviewer.app
        INFOPLIST_GENERATION_MODE: GeneratedFile
        INFOPLIST_KEY_CFBundleDisplayName: MDViewer
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 MDViewer. All rights reserved."
        GENERATE_INFOPLIST_FILE: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies:
      - package: Highlightr

schemes:
  MDViewer:
    build:
      targets:
        MDViewer: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
